# Mosquitto MQTT Broker Configuration for SpikeCanvas
# =======================================================
# This is a basic configuration for development/testing.
# For production use, enable authentication and SSL/TLS.

# Listener configuration
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Allow anonymous connections (DISABLE IN PRODUCTION)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection settings
max_connections -1
max_keepalive 3600

# Message settings
message_size_limit 0
max_queued_messages 1000

# Retained messages
retain_available true
max_queued_bytes 0

# =======================================================
# PRODUCTION CONFIGURATION (uncomment and configure)
# =======================================================

# Authentication
# allow_anonymous false
# password_file /mosquitto/config/passwords.txt

# ACL (Access Control Lists)
# acl_file /mosquitto/config/acl.txt

# SSL/TLS Configuration
# listener 8883
# protocol mqtt
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false
# use_identity_as_username false

# =======================================================
# To create a password file:
# =======================================================
# docker-compose exec mqtt mosquitto_passwd -c /mosquitto/config/passwords.txt username
# docker-compose exec mqtt mosquitto_passwd -b /mosquitto/config/passwords.txt username password
