apiVersion: v1
kind: ConfigMap
metadata:
  name: maxwell-job-configs
  namespace: braingeneers
data:
  sorting_job_info.json: |
    {
      "image": "maxwell-kilosort2-simplified:latest",
      "args": "python /app/src/run_kilosort2.py",
      "cpu_request": "4000m",
      "memory_request": "16Gi",
      "disk_request": "50Gi",
      "GPU": 0,
      "params_label": "kilosort2"
    }
  
  job_type_table.json: |
    {
      "maxwell-kilosort2-simplified:latest": "Spike Sorting",
      "maxwell-si-curation-docker:latest": "Auto-Curation", 
      "maxwell-maxtwo-splitter:latest": "MaxTwo Splitter",
      "maxwell-connectivity:latest": "Connectivity Analysis",
      "maxwell-visualization:latest": "Visualization",
      "maxwell-local-field-potential:latest": "LFP Analysis"
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: maxwell-kilosort2-{job_id}
  namespace: braingeneers
  labels:
    app: maxwell-kilosort2
    component: container
    job-type: spike-sorting
spec:
  template:
    metadata:
      labels:
        app: maxwell-kilosort2
        component: container
        job-type: spike-sorting
    spec:
      containers:
      - name: kilosort2
        image: maxwell-kilosort2-simplified:latest
        args: ["/bin/bash", "-c", "python /app/src/run_kilosort2.py {data_path} {params_path}"]
        env:
        - name: COMPONENT_TYPE
          value: "container"
        - name: CONTAINER_NAME
          value: "kilosort2-simplified"
        - name: JOB_ID
          value: "{job_id}"
        - name: PYTHONPATH
          value: "/app:/app/shared"
        resources:
          requests:
            memory: "16Gi"
            cpu: "4000m"
            ephemeral-storage: "50Gi"
          limits:
            memory: "32Gi"
            cpu: "8000m"
            ephemeral-storage: "100Gi"
        volumeMounts:
        - name: shared-data
          mountPath: /data
        - name: config
          mountPath: /config
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: maxwell-shared-storage
      - name: config
        configMap:
          name: maxwell-config
      - name: tmp
        emptyDir:
          sizeLimit: "20Gi"
      restartPolicy: Never
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600  # Clean up after 1 hour

