---
apiVersion: batch/v1
kind: Job
metadata:
  name: maxwell-maxtwo-splitter-{job_id}
  namespace: braingeneers
  labels:
    app: maxwell-maxtwo-splitter
    component: container
    job-type: splitter
spec:
  template:
    metadata:
      labels:
        app: maxwell-maxtwo-splitter
        component: container
        job-type: splitter
    spec:
      containers:
      - name: maxtwo-splitter
        image: surygeng/maxtwo_splitter:v0.2
        args: ["/bin/bash", "-c", "python /app/src/split_maxwell.py {data_path}"]
        env:
        - name: COMPONENT_TYPE
          value: "container"
        - name: CONTAINER_NAME
          value: "maxtwo-splitter"
        - name: JOB_ID
          value: "{job_id}"
        - name: PYTHONPATH
          value: "/app:/app/shared"
        resources:
          requests:
            memory: "48Gi"    # High allocation for efficient processing
            cpu: "6000m"      # 6 cores for parallel processing
            ephemeral-storage: "100Gi"  # Large files
          limits:
            memory: "48Gi"    # Match request for predictable allocation
            cpu: "6000m"      # Match request for predictable allocation
            ephemeral-storage: "200Gi"
        volumeMounts:
        - name: shared-data
          mountPath: /data
        - name: config
          mountPath: /config
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: maxwell-shared-storage
      - name: config
        configMap:
          name: maxwell-config
      - name: tmp
        emptyDir:
          sizeLimit: "20Gi"
      restartPolicy: Never
  backoffLimit: 2
  ttlSecondsAfterFinished: 1800  # Clean up after 30 minutes

